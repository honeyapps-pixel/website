<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, must-revalidate, max-age=0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Mail bestätigt – Travelbook</title>
    <meta name="description" content="Deine Travelbook-E-Mail wurde bestätigt. Zurück zur App.">
    <link rel="stylesheet" href="../../../style.css">
    <link rel="icon" type="image/png" href="/travelbook/icon.png?v=3">
    <link rel="apple-touch-icon" href="/travelbook/icon.png?v=3">
    <style>
        body {
            background: linear-gradient(180deg, #eef4fa 0%, #ffffff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            margin: 0;
        }
        .card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 48px 32px;
            max-width: 440px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 40px rgba(43, 90, 143, 0.08);
        }
        .card img.logo {
            width: 84px;
            height: 84px;
            border-radius: 20px;
            margin-bottom: 24px;
        }
        .card h1 {
            font-size: 26px;
            letter-spacing: -0.01em;
            margin: 0 0 12px;
            color: var(--text-primary);
        }
        .card p {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.5;
            margin: 0 0 28px;
        }
        .cta {
            display: inline-block;
            background: #2B5A8F;
            color: white;
            padding: 14px 28px;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 700;
            font-size: 15px;
            transition: background 0.15s ease;
        }
        .cta:hover {
            background: #1f4672;
        }
        .hint {
            margin-top: 20px;
            font-size: 13px;
            color: var(--text-tertiary);
        }
        .error {
            display: none;
            color: #c0392b;
            font-size: 14px;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="card">
        <img class="logo" src="/travelbook/icon.png?v=3" alt="Travelbook">
        <h1>E-Mail bestätigt</h1>
        <p>Deine E-Mail-Adresse wurde bestätigt. Du kannst dich jetzt mit deinem Passwort in Travelbook anmelden.</p>
        <a id="openApp" class="cta" href="#">Travelbook öffnen</a>
        <p class="hint">Öffnet die App automatisch. Falls nicht, starte sie manuell vom Homescreen.</p>
        <p class="error" id="errMsg">Der Bestätigungslink ist abgelaufen oder ungültig. Bitte fordere einen neuen an.</p>
    </div>
    <script>
        // Supabase hängt Tokens und Fehler-Parameter an den URL-Fragment-Teil
        // an (#access_token=…, oder #error=… bei abgelaufenen Links). Wir
        // leiten beide an die App weiter — die App zeigt dann ggf. den Fehler.
        (function () {
            var hash = window.location.hash || '';
            var search = window.location.search || '';
            var appUrl = 'travelrank://auth/callback' + hash + search;

            var errParam = /[?#&](error|error_description)=/.test(hash + search);
            if (errParam) {
                document.getElementById('errMsg').style.display = 'block';
            }

            var cta = document.getElementById('openApp');
            cta.href = appUrl;

            // iOS/Android automatisch in die App schicken, aber Safari-Fallback
            // stehen lassen, falls die App nicht installiert ist.
            if (!errParam) {
                setTimeout(function () {
                    window.location.replace(appUrl);
                }, 400);
            }
        })();
    </script>
</body>
</html>

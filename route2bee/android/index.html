<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, must-revalidate, max-age=0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Route2Bee für Android</title>
    <meta name="description" content="Route2Bee für Android im Google Play Store laden.">
    <meta name="robots" content="noindex,follow">
    <link rel="stylesheet" href="../../style.css">
    <link rel="icon" type="image/png" href="/route2bee/icon.png">
    <link rel="apple-touch-icon" href="/route2bee/icon.png">
    <style>
        body {
            background: linear-gradient(180deg, #eef4fa 0%, #ffffff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            margin: 0;
        }
        .card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 48px 32px;
            max-width: 440px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 40px rgba(59, 115, 185, 0.08);
        }
        .card img.logo {
            width: 84px;
            height: 84px;
            border-radius: 20px;
            margin-bottom: 24px;
        }
        .card h1 {
            font-size: 26px;
            letter-spacing: -0.01em;
            margin: 0 0 12px;
            color: var(--text-primary);
        }
        .card p {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.5;
            margin: 0 0 28px;
        }
        .cta {
            display: inline-block;
            background: #3B73B9;
            color: white;
            padding: 14px 28px;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 700;
            font-size: 15px;
            transition: background 0.15s ease;
        }
        .cta:hover {
            background: #2E5FA3;
        }
    </style>
</head>
<body>
    <div class="card">
        <img class="logo" src="/route2bee/icon.png" alt="Route2Bee">
        <h1>Route2Bee für Android</h1>
        <p>Dein digitales Fahrtenbuch, das sich selbst schreibt.</p>
        <a class="cta" href="https://play.google.com/store/apps/details?id=com.johannwarkentin.fahrtenbuch">Bei Google Play laden</a>
    </div>
</body>
</html>
